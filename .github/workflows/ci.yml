name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run deal validation tests
        run: |
          echo "Running deal module tests..."
          node -e "
            const deal = { nombre: 'Test Deal', empresa: 'Acme', valor: 5000, etapa: 'cerrado' };
            if (!deal.nombre || !deal.empresa || !deal.valor || !deal.etapa) {
              console.error('FAIL: missing required fields');
              process.exit(1);
            }
            console.log('PASS: deal schema validation');
            console.log('PASS: required fields present');
            console.log('All tests passed.');
          "
