<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealFlow CRM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 60px;
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: #4f46e5; letter-spacing: -0.5px; }
    .logo span { color: #1a1a2e; }
    .badge { background: #ede9fe; color: #6d28d9; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .avatar { width: 32px; height: 32px; background: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.8rem; font-weight: 600; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .page-sub { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; }

    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
    .card-header h2 { font-size: 1rem; font-weight: 600; }
    .count-badge { background: #f1f5f9; color: #475569; font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.75rem 1.5rem; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    td { padding: 1rem 1.5rem; font-size: 0.875rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    .deal-name { font-weight: 600; color: #1a1a2e; }
    .deal-company { color: #64748b; font-size: 0.8rem; margin-top: 2px; }
    .deal-value { font-weight: 600; color: #059669; }

    .stage-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 500; padding: 3px 10px; border-radius: 99px; }
    .stage-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }
    .stage-prospecto  { background: #eff6ff; color: #3b82f6; }
    .stage-propuesta  { background: #fefce8; color: #ca8a04; }
    .stage-negociacion { background: #fff7ed; color: #ea580c; }
    .stage-cerrado    { background: #f0fdf4; color: #16a34a; }

    .btn-contract {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 600;
      padding: 4px 10px;
      background: #f0fdf4; color: #16a34a;
      border: 1px solid #bbf7d0;
      border-radius: 6px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-contract:hover { background: #dcfce7; }

    .empty-state { text-align: center; padding: 3rem 1.5rem; color: #94a3b8; }
    .empty-state p { font-size: 0.9rem; margin-top: 0.75rem; }

    .card-body { padding: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
    input, select { width: 100%; padding: 0.6rem 0.875rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; color: #1a1a2e; background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .btn-primary { width: 100%; padding: 0.7rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: #4338ca; }

    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.875rem 1.25rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: none; z-index: 999; max-width: 320px; }
    #toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    #toast.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .modal-sub { color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .modal-deal { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a2e; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; padding: 0.65rem; background: #f1f5f9; color: #475569; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-send { flex: 2; padding: 0.65rem; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    .btn-send:hover { background: #15803d; }
  </style>
</head>
<body>

<header>
  <span class="logo">Deal<span>Flow</span></span>
  <span class="badge">BETA</span>
  <div class="header-right">
    <div class="avatar">DC</div>
  </div>
</header>

<main>
  <div class="page-title">Pipeline de Deals</div>
  <div class="page-sub">Gestiona y actualiza tus oportunidades comerciales</div>

  <div class="grid">
    <div class="card">
      <div class="card-header">
        <h2>Deals activos</h2>
        <span class="count-badge" id="deal-count">0</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Deal</th>
            <th>Valor</th>
            <th>Etapa</th>
            <th>Contrato</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="deals-body">
          <tr id="empty-row">
            <td colspan="5">
              <div class="empty-state">
                <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p>No hay deals aún. Agrega el primero.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Nuevo deal</h2>
      </div>
      <div class="card-body">
        <form id="deal-form">
          <div class="form-group">
            <label for="nombre">Nombre del deal</label>
            <input id="nombre" type="text" placeholder="Ej: Renovación licencias Q3" required />
          </div>
          <div class="form-group">
            <label for="empresa">Empresa</label>
            <input id="empresa" type="text" placeholder="Ej: Acme Corp" required />
          </div>
          <div class="form-group">
            <label for="email">Email del contacto</label>
            <input id="email" type="email" placeholder="Ej: contacto@acme.com" required />
          </div>
          <div class="form-group">
            <label for="valor">Valor (USD)</label>
            <input id="valor" type="number" placeholder="Ej: 12000" min="0" required />
          </div>
          <div class="form-group">
            <label for="etapa">Etapa</label>
            <select id="etapa" required>
              <option value="">Seleccionar etapa...</option>
              <option value="prospecto">Prospecto</option>
              <option value="propuesta">Propuesta</option>
              <option value="negociacion">Negociación</option>
              <option value="cerrado">Cerrado</option>
            </select>
          </div>
          <button class="btn-primary" type="submit">Guardar deal</button>
        </form>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<div class="modal-overlay" id="contract-modal">
  <div class="modal">
    <h3>Confirmar envío de contrato</h3>
    <p class="modal-sub">Verifica el email del firmante antes de enviar.</p>
    <div class="modal-deal" id="modal-deal-name"></div>
    <div class="form-group" style="margin-bottom:0">
      <label for="modal-email">Email del firmante</label>
      <input id="modal-email" type="email" placeholder="contacto@empresa.com" required />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeContractModal()">Cancelar</button>
      <button class="btn-send" onclick="confirmSendContract()">📄 Enviar contrato</button>
    </div>
  </div>
</div>

<script src="deals.js"></script>
</body>
</html>
